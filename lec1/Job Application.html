<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>

    <style>

        body{
            background-color: rgb(255, 255, 255);
            font-family: Arial;
        }

        .box{
            width: 400px;
            margin: 50px auto;
            padding: 25px;
            background-color: white;
            border: 2px solid rgb(4, 18, 49);
            border-radius: 10px;
        }

        h1{
            text-align: center;
            color: rgb(23, 35, 92);
        }

        input{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: rgb(56, 79, 134);;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

<div class="box">

<h2>Job Application Form</h2>

<form>

    Full Name:
    <input type="text">

    <br><br>

    Email:
    <input type="email">

    <br><br>

    Phone Number:
    <input type="tel">

    <br><br>

    Gender:
    <br>

    <input type="radio" name="gender" style="width:auto;"> Male

    <input type="radio" name="gender" style="width:auto;"> Female

    <input type="radio" name="gender" style="width:auto;"> Other

    <br><br>

    Skills:
    <br>

    <input type="checkbox" style="width:auto;"> HTML
    <br>

    <input type="checkbox" style="width:auto;"> CSS
    <br>

    <input type="checkbox" style="width:auto;"> Java
    <br>

    <input type="checkbox" style="width:auto;"> SQL

    <br><br>

    Resume Upload:
    <input type="file">

    <br><br>

    <button type="submit">Submit</button>

</form>

</div>

</body>
</html>
