
<!DOCTYPE html>
<html>
<head>
    <title>Student Report Card</title>

    <style>

        body{
            background-color: rgb(255, 253, 243);
            font-family: Arial;
        }

        .container{
            width: 500px;
            margin: 50px auto;
            padding: 25px;
            background-color: white;
            border: 2px solid rgb(65, 5, 65);
            border-radius: 10px;
            text-align: center;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        th,td{
            border: 1px solid black;
            padding: 10px;
        }

        h2{
            color: rgb(68, 60, 11);
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Student Report Card</h2>

    <h3>Student Name: Nisha</h3>

    <table>

        <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>

        <tr>
            <td>Tamil</td>
            <td>95</td>
            <td>A+</td>
        </tr>

        <tr>
            <td>English</td>
            <td>88</td>
            <td>A</td>
        </tr>

        <tr>
            <td>Maths</td>
            <td>82</td>
            <td>B+</td>
        </tr>

        <tr>
            <td>Computer Science</td>
            <td>91</td>
            <td>A+</td>
        </tr>

        <tr>
            <td>Accounts</td>
            <td>76</td>
            <td>B</td>
        </tr>

    </table>

</div>

</body>
</html>
